<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Random - Darts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <h1>Cricket Random</h1>
        </header>

        <section class="setup-section" id="setup-screen">
            <h2>Nouvelle Partie</h2>
            <p>Sélectionnez le nombre de joueurs :</p>
            <div class="player-selector">
                <button class="btn-player active" data-players="1">1 Joueur</button>
                <button class="btn-player" data-players="2">2 Joueurs</button>
                <button class="btn-player" data-players="3">3 Joueurs</button>
                <button class="btn-player" data-players="4">4 Joueurs</button>
            </div>
            <button id="start-game-btn" class="btn-primary">Commencer la partie</button>
        </section>

        <section class="game-section" id="game-screen">
            <div class="game-header">
                <h2 id="current-player-display">Joueur 1</h2>
                <div class="darts-left">Fléchette <span id="dart-count">1</span> / 3</div>
            </div>
            
            <div class="score-board">
                <button class="btn-score" data-points="20">20</button>
                <button class="btn-score" data-points="19">19</button>
                <button class="btn-score" data-points="18">18</button>
                <button class="btn-score" data-points="17">17</button>
                <button class="btn-score" data-points="16">16</button>
                <button class="btn-score" data-points="15">15</button>
                <button class="btn-score" data-points="25">Bullseye</button>
                <button class="btn-score btn-miss" data-points="0">Manqué</button>
            </div>
        </section>

        <section class="stats-section">
            <h2>Statistiques globales</h2>
            <div id="stats-container">
                <p>Aucune partie en cours.</p>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
