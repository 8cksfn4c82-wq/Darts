<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cricket Random</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --accent-color: #00e676;
            --btn-bg: #1e1e1e;
            --btn-active: #ffc107;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
        }
        #app { width: 100%; max-width: 500px; }
        .screen { display: flex; flex-direction: column; gap: 15px; }
        .hidden { display: none !important; }
        h1, h2 { text-align: center; margin: 10px 0; }
        button {
            background-color: var(--btn-bg);
            color: white;
            border: 2px solid #333;
            padding: 15px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
        }
        button:active { filter: brightness(1.3); }
        .menu-buttons { display: flex; flex-direction: column; gap: 10px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        th, td { border: 1px solid #444; padding: 8px; text-align: center; }
        .score-display { color: var(--accent-color); font-weight: bold; }
        #targets-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .modifier-row { display: flex; gap: 5px; margin-bottom: 10px; }
        .modifier-row button { flex: 1; }
        .modifier-row button.active { background-color: var(--btn-active); color: black; border-color: var(--btn-active); }
        .action-row { display: flex; gap: 5px; }
        .action-row button { flex: 1; }
        .btn-miss { background-color: #cf6679; }
        .btn-undo { background-color: #3700b3; }
        .setup-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
        .setup-group select { padding: 10px; font-size: 1rem; background: #222; color: #fff; border: 1px solid #444; border-radius: 5px; }
        .input-player input { width: 90%; padding: 10px; margin-bottom: 10px; background: #222; color: #fff; border: 1px solid #444; border-radius: 5px; font-size: 1rem; }
    </style>
</head>
<body>
    <div id="app">
        <section id="screen-home" class="screen">
            <h1>Cricket Random</h1>
            <div class="menu-buttons">
                <button id="btn-new-game" onclick="showScreen('screen-setup')" style="background: var(--accent-color); color: black; font-weight: bold;">Nouvelle Partie</button>
                <button id="btn-stats" onclick="showStats()">Statistiques</button>
            </div>
        </section>

        <section id="screen-setup" class="screen hidden">
            <h2>Nouvelle Partie</h2>
            <div class="setup-group">
                <label>Nombre de joueurs :</label>
                <select id="nb-players" onchange="updatePlayerInputs()">
                    <option value="1">1 Joueur</option>
                    <option value="2" selected>2 Joueurs</option>
                    <option value="3">3 Joueurs</option>
                    <option value="4">4 Joueurs</option>
                </select>
            </div>
            <div id="player-names-container"></div>
            <button style="background: var(--accent-color); color: black; font-weight: bold;" onclick="startGame()">Lancer la partie</button>
            <button onclick="showScreen('screen-home')">Retour</button>
        </section>

        <section id="screen-game" class="screen hidden">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 id="active-player-name" style="margin: 0; color: var(--accent-color);">Joueur</h2>
                <div id="turn-info">Fléchette <span id="current-dart">1</span> / 3</div>
            </div>
            <div id="scoreboard-container"></div>
            <div id="input-board">
                <div id="targets-grid"></div>
                <div class="modifier-row">
                    <button id="mod-single" class="active" onclick="setModifier(1)">Simple</button>
                    <button id="mod-double" onclick="setModifier(2)">Double</button>
                    <button id="mod-triple" onclick="setModifier(3)">Triple</button>
                </div>
                <div class="action-row">
                    <button class="btn-miss" onclick="hitMiss()">MISS</button>
                    <button class="btn-undo" onclick="undoLastAction()">Annuler</button>
                </div>
            </div>
        </section>

        <section id="screen-stats" class="screen hidden">
            <h2>Statistiques globales</h2>
            <div id="stats-content"></div>
            <button onclick="showScreen('screen-home')">Retour</button>
        </section>
    </div>

    <script>
        let gameState = { players: [], activePlayerIndex: 0, currentDart: 1, numbers: [], history: [], isOver: false };
        let currentModifier = 1;
        let stats = JSON.parse(localStorage.getItem('cricket_stats')) || { gamesPlayed: 0, wins: 0, triples: 0, totalBulls: 0, totalMisses: 0 };

        window.onload = function() { updatePlayerInputs(); };
        
        function showScreen(screenId) { 
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden')); 
            document.getElementById(screenId).classList.remove('hidden'); 
        }
        
        function updatePlayerInputs() {
            const count = parseInt(document.getElementById('nb-players').value);
            const container = document.getElementById('player-names-container');
            container.innerHTML = '';
            for (let i = 1; i <= count; i++) { 
                container.innerHTML += `<div class="input-player"><input type="text" id="p-name-${i}" value="Joueur ${i}" autocomplete="off"></div>`; 
            }
        }
        
        function generateCricketNumbers() {
            let pool = Array.from({length: 11}, (_, i) => i + 10);
            let shuffled = pool.sort(() => 0.5 - Math.random());
            let selected = shuffled.slice(0, 5);
            
            // Tri décroissant du plus grand au plus petit
            selected.sort((a, b) => b - a);
            
            selected.push('BULL'); // Bull toujours en dernier
            return selected;
        }
        
        function startGame() {
            const count = parseInt(document.getElementById('nb-players').value);
            gameState.players = []; 
            gameState.numbers = generateCricketNumbers(); 
            gameState.activePlayerIndex = 0; 
            gameState.currentDart = 1; 
            gameState.history = []; 
            gameState.isOver = false;
            
            for (let i = 1; i <= count; i++) {
                let name = document.getElementById(`p-name-${i}`).value.trim() || `Joueur ${i}`;
                let playerMarks = {}; 
                gameState.numbers.forEach(n => playerMarks[n] = 0);
                gameState.players.push({ name: name, score: 0, marks: playerMarks });
            }
            renderGameBoard(); 
            showScreen('screen-game');
        }
        
        function saveStats() { 
            localStorage.setItem('cricket_stats', JSON.stringify(stats)); 
        }
        
        function applyHit(player, number, value) {
            const current = player.marks[number]; 
            const total = current + value;
            if (total <= 3) { player.marks[number] = total; return; }
            player.marks[number] = 3; 
            const extra = total - 3;
            const othersOpen = gameState.players.some(p => p !== player && p.marks[number] < 3);
            if (othersOpen) { 
                const points = number === 'BULL' ? 25 : Number(number); 
                player.score += extra * points; 
            }
        }
        
        function setModifier(mod) {
            currentModifier = mod;
            document.querySelectorAll('.modifier-row button').forEach(b => b.classList.remove('active'));
            if(mod === 1) document.getElementById('mod-single').classList.add('active');
            if(mod === 2) document.getElementById('mod-double').classList.add('active');
            if(mod === 3) document.getElementById('mod-triple').classList.add('active');
        }
        
        function triggerHit(number) {
            if (gameState.isOver) return;
            if (number === 'BULL' && currentModifier === 3) return; // Triple Bull interdit
            
            gameState.history.push(JSON.stringify(gameState));
            if (gameState.history.length > 1) gameState.history.shift();
            
            let player = gameState.players[gameState.activePlayerIndex];
            if (currentModifier === 3) stats.triples++;
            if (number === 'BULL') stats.totalBulls += currentModifier;
            
            applyHit(player, number, currentModifier); 
            advanceDart();
        }
        
        function hitMiss() {
            if (gameState.isOver) return;
            gameState.history.push(JSON.stringify(gameState));
            if (gameState.history.length > 1) gameState.history.shift();
            stats.totalMisses++; 
            advanceDart();
        }
        
        function advanceDart() {
            checkVictory();
            if (gameState.isOver) { endGame(); return; }
            if (gameState.currentDart < 3) { 
                gameState.currentDart++; 
            } else { 
                gameState.currentDart = 1; 
                gameState.activePlayerIndex = (gameState.activePlayerIndex + 1) % gameState.players.length; 
                if(navigator.vibrate) navigator.vibrate(50); 
            }
            setModifier(1); 
            renderGameBoard();
        }
        
        function undoLastAction() { 
            if (gameState.history.length === 0) return; 
            gameState = JSON.parse(gameState.history.pop()); 
            renderGameBoard(); 
        }
        
        function checkVictory() {
            let player = gameState.players[gameState.activePlayerIndex];
            let allClosed = gameState.numbers.every(n => player.marks[n] === 3);
            let highestScore = gameState.players.every(p => player.score >= p.score);
            if (allClosed && highestScore) { gameState.isOver = true; }
        }
        
        function endGame() { 
            stats.gamesPlayed++; 
            stats.wins++; 
            saveStats(); 
            alert(`Victoire de ${gameState.players[gameState.activePlayerIndex].name} !`); 
            showScreen('screen-home'); 
        }
        
        function renderGameBoard() {
            let activePlayer = gameState.players[gameState.activePlayerIndex];
            document.getElementById('active-player-name').innerText = activePlayer.name;
            document.getElementById('current-dart').innerText = gameState.currentDart;
            let container = document.getElementById('scoreboard-container');
            let html = `<table><tr><th>Cibles</th>`;
            gameState.players.forEach(p => { html += `<th>${p.name}<br><span class="score-display">${p.score} pts</span></th>`; });
